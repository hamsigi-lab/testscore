<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>가족 발표 평가</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="app">

  <!-- 1. 누구세요? -->
  <div id="view-select-who" class="view active">
    <div class="page-header">
      <h1>🎤 가족 발표 평가</h1>
      <p class="subtitle">먼저 누구인지 선택해 주세요</p>
    </div>
    <div id="who-grid" class="member-grid"></div>
    <div class="bottom-nav">
      <button onclick="showView('results')" class="btn-text">📊 지난 결과</button>
      <button onclick="showView('qr')" class="btn-text">📱 QR 코드</button>
    </div>
  </div>

  <!-- 2. 평가 화면 -->
  <div id="view-evaluate" class="view">
    <div class="page-header">
      <button onclick="showView('select-who')" class="btn-back">← 나가기</button>
      <div id="eval-who-badge" class="evaluator-badge"></div>
      <h2>발표 평가</h2>
    </div>

    <!-- 진행 중인 라운드 없을 때 -->
    <div id="no-round" style="display:none">
      <div class="center-fill">
        <div class="big-emoji">🎤</div>
        <h3>아직 평가가 시작되지 않았어요</h3>
        <p style="color:var(--muted);font-size:0.9rem">첫 번째로 시작하거나 지난 결과를 확인하세요</p>
        <div class="btn-group" style="width:100%">
          <button onclick="startRound()" class="btn-primary">새 평가 시작하기</button>
          <button onclick="showView('results')" class="btn-secondary">지난 결과 보기</button>
        </div>
      </div>
    </div>

    <!-- 라운드 진행 중 -->
    <div id="round-active" style="display:none">
      <div id="round-progress-bar" class="progress-bar"></div>
      <div id="presenter-tabs" class="eval-tabs"></div>
      <div id="eval-done-banner" class="complete-banner" style="display:none">
        ✅ 내 평가가 모두 완료됐어요!
      </div>
      <div id="eval-content" class="eval-body"></div>
      <div class="form-footer">
        <div class="footer-inner">
          <span id="save-status" class="save-status"></span>
          <button id="save-btn" onclick="saveEval()" class="btn-primary btn-save" disabled>저장</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 3. 결과 / 순위 -->
  <div id="view-results" class="view">
    <div class="page-header">
      <button onclick="showView('select-who')" class="btn-back">← 홈</button>
      <h2>📊 순위</h2>
    </div>
    <div id="results-content">
      <div class="center-fill"><div class="spinner"></div></div>
    </div>
  </div>

  <!-- 4. QR 코드 -->
  <div id="view-qr" class="view">
    <div class="page-header">
      <button onclick="showView('select-who')" class="btn-back">← 홈</button>
      <h2>📱 QR 코드</h2>
      <p class="subtitle">스캔하면 바로 본인 평가 화면으로 이동해요</p>
    </div>
    <div id="qr-content"></div>
    <div style="padding: 0 20px 20px;">
      <button onclick="window.print()" class="btn-secondary">🖨️ 인쇄하기</button>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script src="/js/config.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
