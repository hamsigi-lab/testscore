<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>가족 발표 평가</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="app">

  <!-- 발표자 선택 (세션 없을 때 첫 화면) -->
  <div id="view-presenter" class="view active">
    <div class="page-header">
      <h1>🎤 가족 발표 평가</h1>
      <p class="subtitle">오늘 발표할 사람을 선택하세요</p>
    </div>
    <div id="presenter-grid" class="member-grid"></div>
    <div class="bottom-nav">
      <button onclick="goResults()" class="btn-text">📊 지난 결과</button>
      <button onclick="showView('qr')" class="btn-text">📱 QR 코드</button>
    </div>
  </div>

  <!-- 메인 (세션 진행 중) -->
  <div id="view-main" class="view">
    <div class="page-header">
      <h2 id="main-title"></h2>
      <p id="main-progress" class="subtitle"></p>
    </div>
    <p class="hint-text">평가할 사람의 이름을 눌러 점수를 입력하세요</p>
    <div id="main-grid" class="member-grid"></div>
    <div id="main-complete" style="display:none; padding: 0 20px 12px;">
      <button onclick="goResults()" class="btn-primary">🏆 최종 결과 보기</button>
    </div>
    <div class="bottom-nav">
      <button onclick="newPresenter()" class="btn-text">🔄 새 발표</button>
      <button onclick="goResults()" class="btn-text">📊 순위</button>
      <button onclick="showView('qr')" class="btn-text">📱 QR</button>
    </div>
  </div>

  <!-- 평가 (탭 방식) -->
  <div id="view-evaluate" class="view">
    <div class="page-header">
      <button onclick="backToMain()" class="btn-back">← 돌아가기</button>
      <h2 id="eval-presenter-title"></h2>
    </div>
    <div id="eval-tabs" class="eval-tabs"></div>
    <div id="eval-complete-banner" class="complete-banner" style="display:none">
      🎉 모든 평가 완료!
      <button onclick="goResults()">결과 보기 →</button>
    </div>
    <div id="eval-content" class="eval-body"></div>
    <div class="form-footer">
      <div class="footer-inner">
        <span id="save-status" class="save-status"></span>
        <button id="save-btn" onclick="saveEvaluation()" class="btn-primary btn-save" disabled>저장</button>
      </div>
    </div>
  </div>

  <!-- 순위 / 결과 -->
  <div id="view-results" class="view">
    <div class="page-header">
      <button onclick="backToMain()" class="btn-back">← 홈</button>
      <h2>📊 순위</h2>
    </div>
    <div id="results-content">
      <div class="center-fill"><div class="spinner"></div></div>
    </div>
  </div>

  <!-- QR 코드 -->
  <div id="view-qr" class="view">
    <div class="page-header">
      <button onclick="backToMain()" class="btn-back">← 홈</button>
      <h2>📱 QR 코드</h2>
      <p class="subtitle">각자의 QR 코드를 스캔하면 바로 접속돼요</p>
    </div>
    <div id="qr-content"></div>
    <div style="padding: 0 20px 20px;">
      <button onclick="window.print()" class="btn-secondary">🖨️ 인쇄하기</button>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script src="/js/config.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
